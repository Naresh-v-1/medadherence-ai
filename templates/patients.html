<!DOCTYPE html>
<html>
<head>
    <title>Patients - MedAdherence AI</title>
</head>
<body>
    <h1>TB Patients</h1>
    <table border="1" cellpadding="8">
        <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Age</th>
            <th>Dose Time</th>
            <th>Action</th>
        </tr>
        {% for patient in patients %}
        <tr>
            <td>{{ patient.name }}</td>
            <td>{{ patient.phone }}</td>
            <td>{{ patient.age }}</td>
            <td>{{ patient.dose_time }}</td>
            <td><a href="/checkin/{{ patient.id }}">Check-in</a></td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
