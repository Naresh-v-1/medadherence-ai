<!DOCTYPE html>
<html>
<head>
    <title>Health Worker Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="navbar">
        <h2>MedAdherence AI</h2>
    </div>

    <div class="container">
        <h1>Health Worker Login</h1>
        <p>Please enter the password to access the patient risk dashboard.</p>

        {% if error %}
        <p style="color: red;"><strong>{{ error }}</strong></p>
        {% endif %}

        <form method="POST">
            <label>Password:</label>
            <input type="password" name="password" required style="padding:8px; border-radius:6px; border:1px solid #ccc;">
            <br><br>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
