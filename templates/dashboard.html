<!DOCTYPE html>
<html>
<head>
    <title>Health Worker Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="navbar">
        <h2>MedAdherence AI</h2>
        <div>
            <a href="/dashboard">Dashboard</a>
            <a href="/patients">Patient Check-in</a>
        </div>
    </div>

    <div class="container">
        <h1>Health Worker Dashboard</h1>
        <p>Patients sorted by risk — highest risk shown first.</p>

        <table>
            <tr>
                <th>Risk Level</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Reason</th>
            </tr>
            {% for p in patients %}
            <tr class="{{ p.risk }}">
                <td><span class="badge {{ p.risk }}">{{ p.risk }}</span></td>
                <td>{{ p.name }}</td>
                <td>{{ p.phone }}</td>
                <td>{{ p.reason }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
