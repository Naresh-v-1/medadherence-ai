<!DOCTYPE html>
<html>
<head>
    <title>Patient Login - MedAdherence AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="navbar">
        <h2>MedAdherence AI</h2>
        <div>
            <a href="/patient-register">Register</a>
        </div>
    </div>

    <div class="container">
        <h1>Patient Login</h1>

        {% if error %}
        <p style="color: red;"><strong>{{ error }}</strong></p>
        {% endif %}

        <form method="POST">
            <label>Phone Number:</label>
            <input type="text" name="phone" required style="padding:8px; width:100%; max-width:300px; border-radius:6px; border:1px solid #ccc;"><br><br>

            <label>Password:</label>
            <input type="password" name="password" required style="padding:8px; width:100%; max-width:300px; border-radius:6px; border:1px solid #ccc;"><br><br>

            <button type="submit">Login</button>
        </form>

        <br>
        <p>New here? <a href="/patient-register">Create an account</a></p>
    </div>
</body>
</html>
